; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:AirbrakesV3]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower
board_upload.maximum_size = 16777216
board_build.filesystem_size = 15728640
board_build.filesystem = littlefs
board_build.arduino.earlephilhower.usb_manufacturer = Srijan
board_build.arduino.earlephilhower.usb_product = AIrbrakes V3
monitor_speed = 115200
lib_deps = 
    finani/ICM42688@^1.1.0
    # NOTE: CAN is intentionally NOT listed here. sandeepmistry/CAN@^0.3.1
    # has no 20 MHz crystal support, so this project vendors a patched copy
    # of it in lib/CAN (adds a 20 MHz MCP2515 CNF table). PlatformIO will
    # always prefer the local lib/CAN copy over any registry package with
    # the same name, so do not add a sandeepmistry/CAN entry above.
